<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SereneMind Support Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f7f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── Widget shell ── */
    .sm-widget {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    /* ── Header ── */
    .sm-header {
      background: #1a5c48;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sm-header-left { display: flex; align-items: center; gap: 10px; }
    .sm-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
    }
    .sm-header h1 { color: #fff; font-size: 14px; font-weight: 600; }
    .sm-header p  { color: rgba(255,255,255,0.72); font-size: 11px; margin-top: 1px; }
    .sm-clear-btn {
      background: rgba(255,255,255,0.15); border: none; border-radius: 8px;
      color: #fff; font-size: 11px; padding: 5px 10px; cursor: pointer;
      transition: background 0.15s;
    }
    .sm-clear-btn:hover { background: rgba(255,255,255,0.28); }

    /* ── Message area ── */
    .sm-body {
      flex: 1;
      min-height: 340px;
      max-height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fff;
      scroll-behavior: smooth;
    }
    .sm-body::-webkit-scrollbar { width: 4px; }
    .sm-body::-webkit-scrollbar-track { background: transparent; }
    .sm-body::-webkit-scrollbar-thumb { background: #c8e6d8; border-radius: 4px; }

    /* ── Message rows ── */
    .sm-row { display: flex; align-items: flex-end; gap: 8px; }
    .sm-row.user { flex-direction: row-reverse; }

    .sm-bot-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: #e1f5ee;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .sm-bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.55;
      border-radius: 18px;
    }
    .sm-bubble.bot  { background: #f5f5f5; color: #1a1a1a; border-radius: 4px 18px 18px 18px; }
    .sm-bubble.user { background: #1a5c48; color: #fff;    border-radius: 18px 4px 18px 18px; }

    /* ── Typing animation ── */
    .sm-bubble.typing {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 16px;
    }
    .sm-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #aaa;
      animation: smBounce 1.2s infinite;
    }
    .sm-dot:nth-child(2) { animation-delay: 0.2s; }
    .sm-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes smBounce {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30%            { opacity: 1;   transform: translateY(-5px); }
    }

    /* ── Footer ── */
    .sm-footer {
      background: #f9fdf9;
      border-top: 1px solid #e8f4ed;
      padding: 12px 14px 14px;
    }

    /* Suggestion chips */
    .sm-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .sm-chip {
      background: #fff; border: 1px solid #b3d9c5; border-radius: 14px;
      padding: 5px 11px; font-size: 12px; color: #0f6e56;
      cursor: pointer; transition: all 0.15s;
    }
    .sm-chip:hover { background: #e1f5ee; border-color: #5dcaa5; }

    /* Input row */
    .sm-input-row { display: flex; gap: 8px; align-items: center; }
    .sm-input {
      flex: 1; border: 1px solid #c8e6d8; border-radius: 22px;
      padding: 9px 16px; font-size: 13px;
      background: #fff; color: #1a1a1a;
      outline: none; font-family: inherit;
      transition: border-color 0.15s;
    }
    .sm-input:focus { border-color: #1a5c48; }
    .sm-input::placeholder { color: #aaa; }

    .sm-send {
      width: 36px; height: 36px; border-radius: 50%;
      background: #1a5c48; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    .sm-send:hover   { opacity: 0.85; }
    .sm-send:disabled { opacity: 0.38; cursor: not-allowed; }

    /* Disclaimer */
    .sm-disclaimer {
      font-size: 10.5px; color: #999; text-align: center; margin-top: 9px;
    }

    /* Crisis banner */
    .sm-crisis {
      background: #fff8e1; border: 1px solid #ffe082; border-radius: 10px;
      padding: 8px 12px; font-size: 11.5px; color: #795519;
      margin-top: 8px; display: none;
    }
    .sm-crisis a { color: #795519; font-weight: 600; text-decoration: underline; }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      body { background: #0e1f18; }
      .sm-widget { background: #111; box-shadow: 0 8px 32px rgba(0,0,0,0.45); }
      .sm-body { background: #111; }
      .sm-bubble.bot { background: #1e2e28; color: #e8f4ed; }
      .sm-footer { background: #161f1b; border-top-color: #1e2e28; }
      .sm-input  { background: #1e2e28; color: #e8f4ed; border-color: #2a4236; }
      .sm-chip   { background: #1e2e28; border-color: #2a4236; color: #5dcaa5; }
      .sm-chip:hover { background: #0f3a28; }
      .sm-disclaimer { color: #555; }
    }
  </style>
</head>
<body>

<main class="sm-widget" role="main" aria-label="SereneMind support chat">

  <!-- Header -->
  <div class="sm-header">
    <div class="sm-header-left">
      <div class="sm-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </div>
      <div>
        <h1>SereneMind Support</h1>
        <p>Gentle AI companion · Always here</p>
      </div>
    </div>
    <button class="sm-clear-btn" onclick="clearChat()" aria-label="Clear chat history">Clear</button>
  </div>

  <!-- Messages -->
  <div class="sm-body" id="smBody" role="log" aria-live="polite" aria-label="Chat messages"></div>

  <!-- Footer -->
  <div class="sm-footer">
    <div class="sm-chips" id="smChips"></div>

    <div class="sm-input-row">
      <input class="sm-input" id="smInput"
             type="text"
             placeholder="Share what's on your mind…"
             autocomplete="off"
             aria-label="Type your message" />
      <button class="sm-send" id="smSend" aria-label="Send message">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white" aria-hidden="true">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>

    <p class="sm-disclaimer">
      Not a substitute for professional help. In crisis? Call or text <strong>988</strong>.
    </p>

    <div class="sm-crisis" id="smCrisis" role="alert">
      If you're in crisis, please reach out now:
      <a href="tel:988">Call/text 988</a> (Suicide &amp; Crisis Lifeline) &nbsp;|&nbsp;
      <a href="tel:9152987821">iCall India</a>: 9152987821
    </div>
  </div>
</main>

<script>
  /* ── Config ── */
  const SYSTEM_PROMPT = `You are SereneMind, a gentle and warm AI mental wellness companion embedded on a mental peace website. Your role is to listen with empathy, help users explore their feelings, and provide calming, supportive responses.

Rules:
- You are NOT a therapist. Never diagnose or prescribe.
- Keep responses warm, concise (2–4 sentences), and non-judgmental.
- End each response with one gentle open-ended question to encourage the user to share more.
- If the user expresses suicidal thoughts, self-harm, or a mental health crisis, compassionately mention the 988 Suicide & Crisis Lifeline and iCall India (9152987821).
- Reply in the same language the user uses — Hindi, Hinglish, or English.
- Use plain text only. No markdown, no bullet points.
- Occasional affirmations are welcome: "That sounds really hard", "You're not alone", "Thank you for sharing."`;

  const WELCOME_MSG   = "Hi, I'm glad you're here. This is a safe space. How are you feeling right now? 💚";
  const CHIPS_INITIAL = ["I'm feeling anxious", "I can't sleep well", "Feeling lonely", "Stressed about work"];
  const CHIPS_REPLY   = ["Tell me more…", "How do I calm down?", "I feel better now", "What should I do?"];
  const CRISIS_WORDS  = ["suicide","kill myself","end my life","self harm","self-harm","hurt myself",
                         "want to die","khatam kar","marna chahta","marna chahti","jaan de du","khatam ho jana"];

  /* ── State ── */
  let history = [];
  let busy    = false;

  /* ── DOM refs ── */
  const bodyEl  = document.getElementById('smBody');
  const inputEl = document.getElementById('smInput');
  const sendBtn = document.getElementById('smSend');
  const chipsEl = document.getElementById('smChips');
  const crisisEl= document.getElementById('smCrisis');

  /* ── Helpers ── */
  function addMessage(text, role, isTyping = false) {
    const row = document.createElement('div');
    row.className = 'sm-row' + (role === 'user' ? ' user' : '');

    if (role === 'assistant') {
      const icon = document.createElement('div');
      icon.className = 'sm-bot-icon';
      icon.setAttribute('aria-hidden', 'true');
      icon.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"
        stroke="#0f6e56" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
        <line x1="9" y1="9" x2="9.01" y2="9"/>
        <line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>`;
      row.appendChild(icon);
    }

    const bubble = document.createElement('div');
    if (isTyping) {
      bubble.className = 'sm-bubble bot typing';
      bubble.setAttribute('aria-label', 'SereneMind is typing');
      bubble.innerHTML = '<div class="sm-dot"></div><div class="sm-dot"></div><div class="sm-dot"></div>';
    } else {
      bubble.className = 'sm-bubble ' + role;
      bubble.textContent = text;
    }
    row.appendChild(bubble);
    bodyEl.appendChild(row);
    bodyEl.scrollTop = bodyEl.scrollHeight;
    return row;
  }

  function showChips(chips) {
    chipsEl.innerHTML = '';
    chips.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'sm-chip';
      btn.textContent = label;
      btn.addEventListener('click', () => send(label));
      chipsEl.appendChild(btn);
    });
  }

  function hasCrisisWords(text) {
    const t = text.toLowerCase();
    return CRISIS_WORDS.some(w => t.includes(w));
  }

  /* ── Main send ── */
  async function send(text) {
    text = text.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    chipsEl.innerHTML = '';

    addMessage(text, 'user');
    history.push({ role: 'user', content: text });

    if (hasCrisisWords(text)) crisisEl.style.display = 'block';

    const typingRow = addMessage('', 'assistant', true);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });

      const data = await res.json();
      const reply = data?.content?.[0]?.text
        || "I'm here with you. Could you tell me a little more about what you're feeling?";

      typingRow.remove();
      addMessage(reply, 'assistant');
      history.push({ role: 'assistant', content: reply });

      if (hasCrisisWords(reply)) crisisEl.style.display = 'block';
      showChips(CHIPS_REPLY);

    } catch (err) {
      typingRow.remove();
      addMessage("Having a little trouble connecting. Please try again. 🙏", 'assistant');
      console.error('SereneMind API error:', err);
    }

    busy = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function clearChat() {
    history = [];
    bodyEl.innerHTML = '';
    crisisEl.style.display = 'none';
    init();
  }

  function init() {
    addMessage(WELCOME_MSG, 'assistant');
    showChips(CHIPS_INITIAL);
  }

  /* ── Event listeners ── */
  sendBtn.addEventListener('click', () => send(inputEl.value));
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(inputEl.value); }
  });

  init();
</script>
</body>
</html>
